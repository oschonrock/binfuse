name: Windows UCRT/CLANG/MINGW64 gcc/clang

on: [push, pull_request]

jobs:
  windows-mingw:
    name: ${{ matrix.sys }}
    runs-on: windows-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    defaults:
      run:
        shell: msys2 {0}
    strategy:
      fail-fast: false
      matrix:
        sys: [ UCRT64, CLANG64, MINGW64 ]
    steps:
      - name: checkout code
        uses: actions/checkout@v6
        with:
          submodules: 'recursive'
          
      - name: install msys2
        uses: msys2/setup-msys2@v2.30.0
        with:
          msystem: ${{matrix.sys}}
          update: true
          pacboy: >-
            toolchain
            cmake
            ninja
          
      - name: Configure
        run: cmake -G Ninja -S . -B build -DCMAKE_BUILD_TYPE=debug
        
      - name: Build
        run: cmake --build build
